name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Additional tags beyond auto-generated semver/SHA/latest (comma-separated)'
        required: false
        default: ''
      platforms:
        description: 'Platforms to build for'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: choice
        options:
          - 'linux/amd64'
          - 'linux/amd64,linux/arm64'
  workflow_call:
    inputs:
      version:
        description: 'Version tag to apply'
        required: false
        type: string
        default: ''
    outputs:
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'bun.lock'
      - 'src/**'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Resolve custom tags
        id: custom-tags
        run: |
          TAGS="${{ inputs.tags || '' }}"
          if [ -z "$TAGS" ]; then
            echo "tags=" >> "$GITHUB_OUTPUT"
          else
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "$TAGS" | tr ',' '\n' | sed 's/^/type=raw,value=/' >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
            ${{ steps.custom-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Frontal MCP Server
            org.opencontainers.image.description=Model Context Protocol server for Frontal cloud services
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Frontal Labs
            org.opencontainers.image.source=https://github.com/frontal-labs/mcp-server

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.version || steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.6.0'

      - name: Sign image with cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

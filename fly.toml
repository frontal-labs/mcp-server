# Frontal MCP Server - Fly.io Configuration
# Generated for production deployment on Fly.io

app = "frontal-mcp-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

  [http_service.http_options]
    idle_timeout = 600

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"
    type = "http"
    tls_skip_verify = false

  [[http_service.checks]]
    interval = "10s"
    timeout = "3s"
    grace_period = "5s"
    type = "tcp"

  [[http_service.machine_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "15s"
    command = ["node", "-e", "process.exit(0)"]

[checks]
  [checks.health]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"

[env]
  NODE_ENV = "production"
  MCP_LOG_LEVEL = "info"
  MCP_SERVER_PORT = "3000"
  MCP_SERVER_HOST = "0.0.0.0"
  ENABLE_AI = "true"
  ENABLE_BLOB = "true"
  ENABLE_FUNCTIONS = "true"
  ENABLE_GRAPH = "true"
  ENABLE_PIPELINES = "true"

[deploy]
  strategy = "rolling"

[experimental]
  allowed_public_ports = []

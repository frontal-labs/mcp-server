name: Deploy to Fly.io

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          flyctl status --app frontal-mcp-server
          flyctl checks list --app frontal-mcp-server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Post-deploy smoke test
        run: |
          APP_URL=$(flyctl apps list --json | jq -r '.[] | select(.Name == "frontal-mcp-server") | .Hostname')
          echo "App URL: https://$APP_URL"
          curl -sf "https://$APP_URL/health" || echo "Health check endpoint not yet available (expected for MCP)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

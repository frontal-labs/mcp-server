title = "mcp-server"

[extend]
useDefault = true

[allowlist]
description = "Ignore test fixtures, example env files, and documentation"
paths = [
  '''(^|.*/)fixtures(/.*|$)''',
  '''(^|.*/)testdata(/.*|$)''',
  '''\.env\.example$''',
  '''\.env\.sample$''',
  '''\.env$''',
  '''README\.md$''',
  '''AGENTS\.md$''',
  '''docs/''',
  '''\.test\.ts$''',
  '''\.spec\.ts$''',
  '''test\.env$''',
]

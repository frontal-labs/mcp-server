# Auto-label PRs based on changed paths
labels:
  - name: documentation
    pattern:
      - '*.md'
      - 'docs/**'

  - name: bug
    pattern:
      - 'src/**'

  - name: dependencies
    pattern:
      - 'package.json'
      - 'bun.lock'

  - name: ci/cd
    pattern:
      - '.github/**'

  - name: tests
    pattern:
      - '**/test/**'
      - '**/tests/**'

  - name: enhancement
    pattern:
      - 'src/**'

  - name: security
    pattern:
      - 'SECURITY.md'
      - '.gitleaks.toml'

only: PRs

name: Publish

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if already published
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "already-published=true" >> $GITHUB_OUTPUT
            echo "Version v${{ steps.version.outputs.version }} already published — skipping."
          else
            echo "already-published=false" >> $GITHUB_OUTPUT
            echo "Publishing v${{ steps.version.outputs.version }}..."
          fi

      - name: Build
        if: steps.check.outputs.already-published == 'false'
        run: bun run build

      - name: Setup npm auth
        if: steps.check.outputs.already-published == 'false'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        if: steps.check.outputs.already-published == 'false'
        run: npm publish --access public

      - name: Create git tag
        if: steps.check.outputs.already-published == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.already-published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            See [CHANGELOG.md](./CHANGELOG.md) for release notes.

            ## Installation

            ```bash
            npm install -g @frontal-labs/mcp-server@latest
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: dist/bin/frontal-mcp-server.js

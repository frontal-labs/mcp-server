name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}
          name: v${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}
          body: |
            See [CHANGELOG.md](./CHANGELOG.md) for release notes.

            ## Installation

            ### NPM
            ```bash
            npm install -g @frontal/mcp-server@latest
            ```
          draft: false
          prerelease: ${{ contains(fromJSON(steps.changesets.outputs.publishedPackages)[0].version, 'alpha') || contains(fromJSON(steps.changesets.outputs.publishedPackages)[0].version, 'beta') || contains(fromJSON(steps.changesets.outputs.publishedPackages)[0].version, 'rc') }}
          files: dist/bin/frontal-mcp-server.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# fly.toml app configuration file generated for frontal-mcp-server on 2026-06-07T16:20:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'frontal-mcp-server'
primary_region = 'iad'

[experimental]

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  ENABLE_AI = 'true'
  ENABLE_BLOB = 'true'
  ENABLE_FUNCTIONS = 'true'
  ENABLE_GRAPH = 'true'
  ENABLE_PIPELINES = 'true'
  MCP_LOG_LEVEL = 'info'
  MCP_SERVER_HOST = '0.0.0.0'
  MCP_SERVER_PORT = '3000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [http_service.http_options]
    idle_timeout = 600

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'
    protocol = 'http'
    tls_skip_verify = false

  [[http_service.checks]]
    interval = '10s'
    timeout = '3s'
    grace_period = '5s'

  [[http_service.machine_checks]]
    command = ['node', '-e', 'process.exit(0)']

[checks]
  [checks.health]
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

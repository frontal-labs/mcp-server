apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontal-mcp-server
  namespace: mcp-server
  labels:
    app: frontal-mcp-server
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontal-mcp-server
  template:
    metadata:
      labels:
        app: frontal-mcp-server
        version: v1
    spec:
      containers:
      - name: mcp-server
        image: frontal/mcp-server:latest
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: FRONTAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: frontal-api-key
        - name: FRONTAL_BASE_URL
          value: "https://api.frontal.dev/v1"
        - name: MCP_LOG_LEVEL
          value: "info"
        - name: ENABLE_AI
          value: "true"
        - name: ENABLE_BLOB
          value: "true"
        - name: ENABLE_FUNCTIONS
          value: "true"
        - name: ENABLE_GRAPH
          value: "true"
        - name: ENABLE_PIPELINES
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      securityContext:
        fsGroup: 1001
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
      - name: registry-secret
